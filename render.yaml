services:
  - type: web
    name: ai-support-ticket-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
